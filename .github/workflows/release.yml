name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and release PHAR
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Install Box
        run: composer global require humbug/box --no-progress

      - name: Build PHAR
        run: box compile

      - name: Smoke test PHAR
        run: php builds/nllang.phar examples/hallo.nl

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: builds/nllang.phar
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum builds/nllang.phar | awk '{print $1}')
          URL="https://github.com/aagjalpankaj/nllang/releases/download/${GITHUB_REF_NAME}/nllang.phar"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/aagjalpankaj/homebrew-nllang.git tap

          sed -i "s|url \".*\"|url \"${URL}\"|"           tap/Formula/nllang.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|"  tap/Formula/nllang.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" tap/Formula/nllang.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nllang.rb
          git commit -m "Update nllang to ${GITHUB_REF_NAME}"
          git push
